<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CCXP Simulator</title>
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const base = '/ccxp-simulator';
      const newUrl = base + '/?p=' + encodeURIComponent(
        path.replace(base, '') + search + hash
      );
      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
